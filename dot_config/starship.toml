# Give language-version commands more room, but avoid probing Node unless a
# project has explicit Node markers.
command_timeout = 2000

[directory]
truncation_length = 8
truncate_to_repo = false

[nodejs]
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc", ".tool-versions"]
detect_folders = ["node_modules"]

[package]
disabled = true
