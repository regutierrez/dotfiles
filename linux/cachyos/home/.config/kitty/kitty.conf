# Font Configuration
font_size 12.0

# Window Configuration
window_padding_width 0
enabled_layouts splits:split_axis=horizontal,stack
window_border_width 1
background_opacity 1.0
background_blur 32
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1

# Scrollback
scrollback_lines 3000

# Terminal features
copy_on_select yes
strip_trailing_spaces smart
paste_actions quote-urls-at-prompt
enable_audio_bell no
confirm_os_window_close 0
allow_remote_control yes

# Useful key bindings
map ctrl+c copy_or_interrupt

# CWD-preserving new windows/tabs
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+n new_os_window_with_cwd

# Splits in the current working directory
map ctrl+shift+backslash launch --location=vsplit --cwd=current
map ctrl+shift+- launch --location=hsplit --cwd=current

# Vim-like split navigation
map ctrl+shift+h neighboring_window left
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+l neighboring_window right

# Temporarily zoom the current split/pane
map ctrl+alt+z toggle_layout stack

# Config helpers
map ctrl+shift+slash launch --type=overlay ~/.config/kitty/kitty-shortcuts-help
map ctrl+alt+r load_config_file
map ctrl+alt+d debug_config
map f5 load_config_file
map f6 debug_config

# Existing key bindings
map ctrl+t new_tab

# Use kitty_mod+number (ctrl+shift+number) to jump to tabs instead of windows
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
map ctrl+shift+7 goto_tab 7
map ctrl+shift+8 goto_tab 8
map ctrl+shift+9 goto_tab 9
map ctrl+shift+0 goto_tab 10

map ctrl+plus change_font_size all +1.0
map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

# Tab configuration
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled

# Dank color generation
include dank-tabs.conf
include dank-theme.conf
